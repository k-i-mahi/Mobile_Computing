name: Cleanup Archived Events (Weekly)

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cleanup_archived:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: campusconnect-cleanup-archived
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: firebase/functions
        run: npm ci

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret." >&2
            exit 1
          fi
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - id: run_job
        name: Run cleanup script
        working-directory: firebase/functions
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          ALERT_THRESHOLD_PCT: '0.75'
          CLEANUP_MAX_EVENTS: '300'
          ARCHIVE_RETENTION_DAYS: '90'
        run: |
          SUMMARY_FILE="$RUNNER_TEMP/cleanup-archived-summary.json"
          AUTOMATION_SUMMARY_PATH="$SUMMARY_FILE" node scripts/cleanup-archived-events.cjs
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"
          echo "near_limit=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(Boolean(data.nearLimit)));" "$SUMMARY_FILE")" >> "$GITHUB_OUTPUT"

      - name: Publish run summary
        run: |
          echo "### Cleanup Archived Summary" >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.run_job.outputs.summary_file }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Raise quota alert issue
        if: steps.run_job.outputs.near_limit == 'true'
        uses: actions/github-script@v7
        env:
          SUMMARY_FILE: ${{ steps.run_job.outputs.summary_file }}
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_FILE, 'utf8'));
            const title = `[Automation Alert] Firebase free-tier usage near limit (${summary.jobName})`;
            const body = [
              'Firebase free-tier usage is near the configured threshold.',
              '',
              `Job: ${summary.jobName}`,
              `Finished At: ${summary.finishedAt}`,
              '',
              `Reads today: ${summary.usageTotalsToday.reads}/${summary.freeTierLimits.reads}`,
              `Writes today: ${summary.usageTotalsToday.writes}/${summary.freeTierLimits.writes}`,
              `Deletes today: ${summary.usageTotalsToday.deletes}/${summary.freeTierLimits.deletes}`,
              '',
              'Alerts:',
              ...summary.alerts.map((x) => `- ${x}`),
              '',
              'Action: reduce run frequency or lower per-run batch caps.'
            ].join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
              labels: 'firebase-free-tier-alert'
            });

            const match = existing.data.find((issue) => issue.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: match.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['firebase-free-tier-alert', 'automation']
              });
            }
